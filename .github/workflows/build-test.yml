name: Build Test

on:
  push:
    branches: [ master, v2 ]
  pull_request:
    branches: [ master, v2 ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.1'
        
    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
          
    - name: Download dependencies
      run: go mod download
      
    - name: Build blindbit-oracle
      run: go build -v ./cmd/blindbit-oracle
      
    - name: Run tests (if any)
      run: go test -v ./...
      continue-on-error: true
      
    - name: Verify build output
      run: |
        if [ -f "blindbit-oracle" ]; then
          echo "✅ Build successful: blindbit-oracle binary created"
          ls -la blindbit-oracle
        else
          echo "❌ Build failed: blindbit-oracle binary not found"
          exit 1
        fi